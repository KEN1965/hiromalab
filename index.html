<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Simple WebAR</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      width: 100%;
      height: 100%;
    }

    #ar-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #loading {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
      z-index: 10;
    }

    #start-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: white;
      z-index: 20;
    }
  </style>
</head>

<body>
  <div id="loading">Loading...</div>

  <canvas id="ar-canvas"></canvas>

  <button id="start-btn">START AR</button>

  <script type="module" src="./settings.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
